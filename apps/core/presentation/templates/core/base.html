{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Winnie{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="{% static 'css/base.css' %}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    <a href="#main-content" class="skip-link">Ir al contenido principal</a>
    {% block body %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <div class="toast-container" id="toastContainer" role="status" aria-live="polite"></div>
    {% if messages %}
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const messages = [
                {% for message in messages %}
                { text: "{{ message|escapejs }}", level: "{{ message.tags|default:'info' }}" },
                {% endfor %}
            ];
            messages.forEach(function(msg, i) {
                setTimeout(() => showToast(msg.text, msg.level), i * 200);
            });
        });
    </script>
    {% endif %}
    <script src="{% static 'js/toast.js' %}"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Color progress bars based on percentage: red < 30%, orange < 70%, green >= 70%
            document.querySelectorAll('.progress-bar').forEach(function(bar) {
                const width = parseInt(bar.style.width) || 0;
                if (width < 30) {
                    bar.style.background = '#ef4444'; // red
                } else if (width < 70) {
                    bar.style.background = '#f59e0b'; // orange
                } else {
                    bar.style.background = '#10b981'; // green
                }
                // Make bars thicker and rounded
                bar.style.height = '8px';
                bar.style.borderRadius = '4px';
            });
            // Also fix the parent progress container
            document.querySelectorAll('.progress').forEach(function(p) {
                p.style.height = '8px';
                p.style.borderRadius = '4px';
                p.style.background = '#e2e8f0';
                p.style.overflow = 'hidden';
            });
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
