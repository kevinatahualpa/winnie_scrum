{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Winnie{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="{% static 'css/base.css' %}" rel="stylesheet">
    {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
    <a href="#main-content" class="skip-link">Ir al contenido principal</a>
    {% block body %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <div class="toast-container" id="toastContainer" role="status" aria-live="polite"></div>

    <!-- Confirm Modal -->
    <div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-sm modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h6 class="modal-title" id="confirmModalTitle">Confirmar</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
                </div>
                <div class="modal-body py-2">
                    <p class="mb-0 small" id="confirmModalBody"></p>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-sm btn-ghost" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-sm btn-primary" id="confirmModalBtn">Confirmar</button>
                </div>
            </div>
        </div>
    </div>
    {% if messages %}
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const messages = [
                {% for message in messages %}
                { text: "{{ message|escapejs }}", level: "{{ message.tags|default:'info' }}" },
                {% endfor %}
            ];
            messages.forEach(function(msg, i) {
                setTimeout(() => showToast(msg.text, msg.level), i * 200);
            });
        });
    </script>
    {% endif %}
    <script src="{% static 'js/toast.js' %}"></script>
    <script>
        function showConfirm(title, message, callback) {
            document.getElementById('confirmModalTitle').textContent = title || 'Confirmar';
            document.getElementById('confirmModalBody').textContent = message || '';
            var btn = document.getElementById('confirmModalBtn');
            var modal = new bootstrap.Modal(document.getElementById('confirmModal'));
            var newBtn = btn.cloneNode(true);
            btn.parentNode.replaceChild(newBtn, btn);
            newBtn.addEventListener('click', function() {
                modal.hide();
                if (callback) callback();
            });
            modal.show();
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('form').forEach(function(form) {
                form.addEventListener('submit', function() {
                    var btn = this.querySelector('[type="submit"]');
                    if (btn && !btn.disabled) {
                        btn.disabled = true;
                        var original = btn.innerHTML;
                        btn.dataset.originalHtml = original;
                        btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1" role="status"></span> Guardando...';
                    }
                });
            });
            document.querySelectorAll('.progress-bar').forEach(function(bar) {
                var width = parseInt(bar.style.width) || 0;
                bar.classList.add('progress-bar-' + (width < 30 ? 'danger' : width < 70 ? 'warning' : 'success'));
            });
            document.querySelectorAll('.progress').forEach(function(p) {
                p.classList.add('progress-custom');
            });
            var activeLink = document.querySelector('.sidebar-nav .nav-link.active');
            if (activeLink) {
                activeLink.scrollIntoView({block:'center', behavior:'instant'});
            }
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
