{% extends 'core/base.html' %}
{% block title %}Nueva Suplencia - Winnie{% endblock %}
{% block page_title %}Nueva Suplencia{% endblock %}
{% block body %}
<div class="app-layout">
    {% include 'core/sidebar.html' %}
    <div class="main-area">
        {% include 'core/topbar.html' %}
        <div class="page-content">
            <div class="card border-0">
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Usuario Original</label>
                                <select name="original_user" class="form-select" required>
                                    <option value="">Seleccionar...</option>
                                    {% for u in users %}
                                    <option value="{{ u.id }}">{{ u.get_full_name|default:u.username }} ({{ u.profile.get_role_display }})</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Suplente</label>
                                <select name="substitute_user" class="form-select" required>
                                    <option value="">Seleccionar...</option>
                                    {% for u in users %}
                                    <option value="{{ u.id }}">{{ u.get_full_name|default:u.username }} ({{ u.profile.get_role_display }})</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Fecha Inicio</label>
                                <input type="date" name="start_date" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Fecha Fin</label>
                                <input type="date" name="end_date" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Alcance</label>
                                <select name="scope" class="form-select">
                                    <option value="all">Todo</option>
                                    <option value="area">Solo Area</option>
                                    <option value="projects">Solo Proyectos</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Motivo</label>
                                <textarea name="reason" class="form-control" rows="2" placeholder="Vacaciones, licencia, etc."></textarea>
                            </div>
                        </div>
                        <div class="d-flex justify-content-end gap-2 mt-4">
                            <a href="{% url 'ver_suplencias' %}" class="btn btn-ghost">Cancelar</a>
                            <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i> Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
