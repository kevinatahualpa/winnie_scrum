version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: winnie_db
      POSTGRES_USER: winnie_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-winnie_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U winnie_user -d winnie_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    environment:
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-me-in-production}
      DEBUG: ${DEBUG:-False}
      DB_NAME: winnie_db
      DB_USER: winnie_user
      DB_PASSWORD: ${DB_PASSWORD:-winnie_secret}
      DB_HOST: db
      DB_PORT: 5432
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web}
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
      - log_data:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             gunicorn --bind 0.0.0.0:8000 --workers 3 --timeout 120 config.wsgi:application"

volumes:
  postgres_data:
  media_data:
  static_data:
  log_data:
